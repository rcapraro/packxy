logoutput: stderr

internal: 0.0.0.0 port = 1080
external: ppp0

socksmethod: none
clientmethod: none

user.privileged: root
user.unprivileged: nobody

# --- Performance tuning ---
timeout.negotiate: 5
timeout.connect: 15
timeout.io: 300
timeout.tcp_fin_wait: 30

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: error
}

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    protocol: tcp udp
    log: error
}
